{% extends "user/layout.html" %}

{% block title %}Hồ sơ - InvenStory{% endblock %}

{% block content %}
<section class="profile-section">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar-block">
                <img src="https://ui-avatars.com/api/?name={{ current_user.username }}&background=3b82f6&color=fff&size=128" class="profile-avatar" alt="Avatar">
                <div class="profile-user-info">
                    <div class="profile-name">{{ current_user.full_name or current_user.username }}</div>
                    <div class="profile-email">{{ current_user.email }}</div>
                </div>
            </div>
            <div class="profile-header-actions">
                <button type="button" class="profile-edit-btn" id="editProfileBtn">Chỉnh sửa</button>
                <button type="submit" class="profile-save-btn" id="saveProfileBtn" style="display:none">Lưu</button>
                <button type="button" class="profile-cancel-btn" id="cancelProfileBtn" style="display:none">Hủy</button>
            </div>
        </div>
        <form class="profile-form" id="profileForm" method="POST" action="{{ url_for('user.profile') }}">
            <div class="profile-form-row">
                <div class="profile-form-group">
                    <label for="profile-fullname">Họ và tên</label>
                    <input id="profile-fullname" name="full_name" type="text" value="{{ current_user.full_name }}" placeholder="Nhập họ và tên" readonly>
                </div>
                <div class="profile-form-group">
                    <label for="profile-phone">Số điện thoại</label>
                    <input id="profile-phone" name="phone" type="text" value="{{ current_user.phone or '' }}" placeholder="Nhập số điện thoại" readonly>
                </div>
            </div>
            <div class="profile-form-row">
                <div class="profile-form-group">
                    <label for="profile-gender">Giới tính</label>
                    <select id="profile-gender" name="gender" disabled>
                        <option value="">Chọn giới tính</option>
                        <option value="Nam" {% if current_user.gender=='Nam' %}selected{% endif %}>Nam</option>
                        <option value="Nữ" {% if current_user.gender=='Nữ' %}selected{% endif %}>Nữ</option>
                        <option value="Khác" {% if current_user.gender=='Khác' %}selected{% endif %}>Khác</option>
                    </select>
                </div>
            </div>
            <div class="profile-form-row">
                <div class="profile-form-group" style="flex:1">
                    <label for="profile-email">Email</label>
                    <input id="profile-email" name="email" type="email" value="{{ current_user.email }}" placeholder="Nhập email" readonly>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const editBtn = document.getElementById('editProfileBtn');
    const saveBtn = document.getElementById('saveProfileBtn');
    const cancelBtn = document.getElementById('cancelProfileBtn');
    const form = document.getElementById('profileForm');
    const inputs = form.querySelectorAll('input, select');
    let originalValues = {};

    editBtn.onclick = function() {
        inputs.forEach(input => {
            if (input.name !== 'nickname') {
                input.removeAttribute('readonly');
                input.removeAttribute('disabled');
            }
        });
        originalValues = {};
        inputs.forEach(input => { originalValues[input.name] = input.value; });
        editBtn.style.display = 'none';
        saveBtn.style.display = '';
        cancelBtn.style.display = '';
    };
    cancelBtn.onclick = function() {
        inputs.forEach(input => {
            input.value = originalValues[input.name];
            input.setAttribute('readonly', true);
            if (input.tagName === 'SELECT') input.setAttribute('disabled', true);
        });
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
    };
    form.onsubmit = function() {
        inputs.forEach(input => {
            input.setAttribute('readonly', true);
            if (input.tagName === 'SELECT') input.setAttribute('disabled', true);
        });
        editBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
    };
</script>
{% endblock %}
