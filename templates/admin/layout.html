<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - InvenStory{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-cubes logo-icon"></i>
            <span class="logo-text">InvenStory</span>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li class="nav-item {% if request.endpoint == 'admin_index' %}active{% endif %}">
                    <a href="{{ url_for('admin_index') }}"><i class="fa-solid fa-chart-pie"></i> <span>Tổng quan</span></a>
                </li>
                <li class="nav-item {% if request.endpoint == 'admin_products' %}active{% endif %}">
                    <a href="{{ url_for('admin_products') }}"><i class="fa-solid fa-burger"></i> <span>Sản phẩm</span></a>
                </li>
                <li class="nav-item {% if request.endpoint == 'admin_categories' %}active{% endif %}">
                    <a href="{{ url_for('admin_categories') }}"><i class="fa-solid fa-list-ul"></i> <span>Danh mục</span></a>
                </li>
                <li class="nav-item {% if request.endpoint == 'admin_orders' %}active{% endif %}">
                    <a href="{{ url_for('admin_orders') }}"><i class="fa-solid fa-clipboard-list"></i> <span>Đơn hàng</span></a>
                </li>
                <li class="nav-item {% if request.endpoint == 'admin_feedback' %}active{% endif %}">
                    <a href="{{ url_for('admin_feedback') }}"><i class="fa-solid fa-comment-dots"></i> <span>Góp ý khách hàng</span></a>
                </li>
                <li class="nav-item {% if request.endpoint == 'admin_reports' %}active{% endif %}">
                    <a href="{{ url_for('admin_reports') }}"><i class="fa-solid fa-chart-line"></i> <span>Thống kê doanh thu</span></a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-dropdown" id="userDropdown">
                <div class="user-info-wrapper">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" alt="avatar" class="user-avatar-small">
                    <span class="user-name-text">Quản lý cửa hàng</span>
                    <i class="fa-solid fa-chevron-up toggle-icon" id="arrowIcon"></i>
                </div>

                <div class="user-menu-popover" id="userMenu">
                    <a href="#" class="user-menu-item">
                        <i class="fa-solid fa-key"></i> <span>Đổi mật khẩu</span>
                    </a>
                    <div class="menu-divider"></div>
                    <a href="#" class="user-menu-item logout">
                        <i class="fa-solid fa-right-from-bracket"></i> <span>Đăng xuất</span>
                    </a>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-panel">
        <header class="top-header">
            <div class="header-left-empty"></div>
            <div class="header-tools">
                <span class="current-date">06/04/2026</span>
                <i class="fa-regular fa-bell"></i>
            </div>
        </header>

        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

{% block scripts %}{% endblock %}

</body>
</html>
